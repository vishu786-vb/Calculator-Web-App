<html>
<body>
    <h1>Calculator</h1>
    <div class="calculator">
        <div class="display">
            <input type="text" id="display" readonly placeholder="0">
        </div>
        <div class="buttons">
            <button data-action="clear" class="operator">C</button>
            <button data-action="delete" class="operator">DEL</button>
            <button data-value="%" class="operator">%</button>
            <button data-value="/" class="operator">÷</button>

            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button data-value="*" class="operator">x</button>

            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button data-value="-" class="operator">-</button>

            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button data-value="+" class="operator">+</button>

            <button data-value="0" class="zero">0</button>
            <button data-value=".">.</button>
            <button data-action="calculate" class="equal">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
